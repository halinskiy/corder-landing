<?xml version="1.0" encoding="UTF-8"?>
<!-- Corder Open Graph / Twitter card master, 1200x630.
     Cream bg, dot grid centre-faded, brand mark + wordmark top
     left, big serif headline, single muted subline. No accent
     underline, no footer domain row. Maker confirmed cleaner
     read with just heading plus sub on 2026-05-26. Georgia
     fallback for serif so the rasteriser does not depend on
     Plex Serif being installed. -->

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f7f6"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e6e5e3"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(247,246,246,0)"/>
      <stop offset="100%" stop-color="rgba(247,246,246,1)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dotgrid)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Brand mark tile + wordmark. Geometry follows the canonical mark
       in /Users/3mpq/corder-brand/ (bordered variant), scaled from the
       1024 reference to 96 px. Bars: 14 x 50 rx=7 at x=32/51. The
       12 % hairline keeps the white squircle visible on the cream OG
       background. -->
  <g transform="translate(72, 72)">
    <rect x="0.5" y="0.5" width="95" height="95" rx="21.5" ry="21.5"
          fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <rect x="32" y="23" width="13.5" height="50" rx="6.75" ry="6.75" fill="#111111"/>
    <rect x="50.5" y="23" width="13.5" height="50" rx="6.75" ry="6.75" fill="#111111"/>
    <text x="120" y="74" font-family="Georgia, 'IBM Plex Serif', 'Times New Roman', serif"
          font-size="60" font-weight="500" fill="#111111" letter-spacing="-1">Corder</text>
  </g>

  <!-- Headline + subline anchored to the lower third of the card so the
       brand mark sits in the top zone, empty cream breathes in the
       middle, and the message lands near the bottom edge. Reads as a
       footer-anchored layout in iMessage / Telegram link previews. -->
  <text x="72" y="488" font-family="Georgia, 'IBM Plex Serif', 'Times New Roman', serif"
        font-size="84" font-weight="500" fill="#0a0a0a" letter-spacing="-1.6">Just Record Everything</text>

  <text x="72" y="540" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#525252">Without any bots in the call</text>
</svg>
