<?xml version="1.0" encoding="UTF-8"?>
<!-- Corder Open Graph / Twitter card master, 1200x630.
     Cream bg, dot grid centre-faded, brand mark + wordmark top
     left, big serif headline, accent green underline, two muted
     sublines, getcorder.com footer. Georgia fallback for serif so
     the rasteriser does not depend on Plex Serif being installed. -->

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f7f6"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e6e5e3"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(247,246,246,0)"/>
      <stop offset="100%" stop-color="rgba(247,246,246,1)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dotgrid)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Brand mark tile + wordmark. Wordmark sized so it reads in iMessage
       and Telegram thumbnails, not just in the full-size og-image. -->
  <g transform="translate(72, 72)">
    <rect width="96" height="96" rx="22" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <rect x="29" y="20" width="15" height="56" rx="4.2" fill="#0a0a0a"/>
    <rect x="52" y="20" width="15" height="56" rx="4.2" fill="#0a0a0a"/>
    <text x="120" y="74" font-family="Georgia, 'IBM Plex Serif', 'Times New Roman', serif"
          font-size="60" font-weight="500" fill="#0a0a0a" letter-spacing="-1">Corder</text>
  </g>

  <!-- Headline -->
  <text x="72" y="318" font-family="Georgia, 'IBM Plex Serif', 'Times New Roman', serif"
        font-size="84" font-weight="500" fill="#0a0a0a" letter-spacing="-1.6">Record what was said.</text>

  <!-- Accent underline (single accent rule) -->
  <rect x="72" y="354" width="120" height="4" rx="2" fill="#217a50"/>

  <!-- Subline (two lines) -->
  <text x="72" y="420" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#525252">The Mac meeting recorder.</text>
  <text x="72" y="458" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#525252">No bot in the call.</text>

  <!-- Footer row: domain + accent dot -->
  <g transform="translate(72, 552)">
    <circle cx="8" cy="0" r="6" fill="#217a50"/>
    <text x="28" y="6" font-family="Helvetica, Arial, sans-serif"
          font-size="18" font-weight="500" fill="#0a0a0a" letter-spacing="0.2">getcorder.com</text>
  </g>
</svg>
