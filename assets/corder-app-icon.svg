<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f23"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafaf8"/>
      <stop offset="1" stop-color="#e6e6e2"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="0.55" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Square, full-bleed. macOS Tahoe applies its own Liquid-Glass squircle
       mask to app icons (the same way iOS does), so we deliberately don't
       round the corners ourselves — that lets our content fill the entire
       system tile without a visible inner frame. -->
  <rect x="0" width="512" height="1024" fill="url(#dark)"/>
  <rect x="512" width="512" height="1024" fill="url(#light)"/>
  <rect width="1024" height="1024" fill="url(#gloss)"/>
  <line x1="512" y1="0" x2="512" y2="1024"
        stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  <circle cx="256" cy="512" r="144" fill="#dd3340"/>
  <rect x="686" y="382" width="68" height="260" rx="18" fill="#0e0e0d"/>
  <rect x="782" y="382" width="68" height="260" rx="18" fill="#0e0e0d"/>
</svg>
